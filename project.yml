name: SushiTracker
options:
  bundleIdPrefix: com.sushitracker
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0

targets:
  SushiTracker:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - SushiTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sushitracker.app
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: SushiTracker/Info.plist
      properties:
        CFBundleDisplayName: Sushi Tracker
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
