name: SushiTracker
options:
  bundleIdPrefix: com.sushitracker
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.0.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0

targets:
  SushiTracker:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SushiTracker
        excludes:
          - Config.example.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sushitracker.app
        SWIFT_VERSION: 5.9
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleMobileAds
        product: GoogleMobileAds
    info:
      path: SushiTracker/Info.plist
      properties:
        CFBundleDisplayName: Sushi Tracker
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        # AdMob — replace with your real App ID from AdMob console
        GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        NSUserTrackingUsageDescription: Este identificador será usado para mostrar anúncios relevantes.
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: ludvb6z4fh.skadnetwork
          - SKAdNetworkIdentifier: cp8zw746q7.skadnetwork
          - SKAdNetworkIdentifier: 3sh42y64l3.skadnetwork
